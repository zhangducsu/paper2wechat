name: test

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run quality checks
        run: python .claude/scripts/run_quality_checks.py --json-output .claude/tmp/quality_report.json
